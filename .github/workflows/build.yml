name: 🚀 Build OT Diary APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 🔨 Create fresh Flutter project
        run: |
          flutter create --org com.otdiary --project-name ot_diary temp_project
          cp -r temp_project/android ./android
          rm -rf temp_project

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔥 Inject Firebase Config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: 🔧 Add Firebase to build.gradle
        run: |
          sed -i "s/id 'com.android.application'/id 'com.android.application'\n    id 'com.google.gms.google-services'/" android/app/build.gradle
          sed -i "/dependencies {/a\        classpath 'com.google.gms:google-services:4.4.1'" android/build.gradle 2>/dev/null || true

      - name: 🔨 Build APK
        run: flutter build apk --debug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OT-Diary-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
