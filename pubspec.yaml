name: ot_diary
description: OT Diary - ওভারটাইম ট্র্যাকার অ্যাপ
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_database: ^11.1.0

  # Local Storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3
  path: ^1.9.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # PDF
  pdf: ^3.11.0
  printing: ^5.13.0
  path_provider: ^2.1.3

  # Home Widget
  #home_widget: ^0.6.0

  # UI
  fl_chart: ^0.68.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: HindSiliguri
      fonts:
        - asset: assets/fonts/HindSiliguri-Regular.ttf
        - asset: assets/fonts/HindSiliguri-Bold.ttf
          weight: 700
