name: 🚀 Build OT Diary APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 🗑 Remove old android folder
        run: rm -rf android ios
      - name: 🔨 Create fresh Flutter project
        run: |
          flutter create \
            --org com.otdiary \
            --project-name ot_diary \
            --platforms android \
            .
          # minSdkVersion 23 set করুন
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' android/app/build.gradle
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle
          # App নাম পরিবর্তন
          sed -i 's/android:label="ot_diary"/android:label="OT Diary"/' android/app/src/main/AndroidManifest.xml
          # Permissions যোগ করুন
          sed -i 's/<application/\<uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"\/>\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM"\/>\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"\/>\n    <application/' android/app/src/main/AndroidManifest.xml



      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔨 Build APK
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons
        
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OT-Diary-Release-APK
          path: build/app/outputs/flutter-apk/
          retention-days: 30
